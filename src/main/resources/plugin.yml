name: DTPA
version: '${version}'
main: net.devamy.dtpa.DTPA
api-version: '1.21'
folia-supported: true

commands:
  tpa:
    description: Send a TPA request to a player
    usage: /tpa <player>
    permission: dtpa.command.tpa
  tpahere:
    description: Send a TPAHere request to a player
    usage: /tpahere <player>
    permission: dtpa.command.tpahere
  tpaccept:
    description: Accept a TPA request
    usage: /tpaccept <player>
    permission: dtpa.command.tpaccept
  tpadeny:
    description: Deny a TPA request
    usage: /tpadeny <player>
    aliases: [tpacancel]
    permission: dtpa.command.tpadeny
  tpatoggle:
    description: Toggle receiving TPA requests
    usage: /tpatoggle
    permission: dtpa.command.tpatoggle
  tpaheretoggle:
    description: Toggle receiving TPAHere requests
    usage: /tpaheretoggle
    permission: dtpa.command.tpaheretoggle
  tpauto:
    description: Toggle auto-accepting all TPA requests
    usage: /tpauto
    permission: dtpa.command.tpauto
  tpatoggleconfirm:
    description: Toggle the confirm GUI on/off
    usage: /tpatoggleconfirm
    permission: dtpa.command.tpatoggleconfirm
  tpcancel:
    description: Cancel your own outgoing pending TPA request
    usage: /tpcancel
    permission: dtpa.command.tpcancel
  tpareload:
    description: Reload the plugin config
    usage: /tpareload
    permission: dtpa.command.tpareload
  tpalist:
    description: List your pending TPA requests
    usage: /tpalist [player]
    permission: dtpa.command.tpalist
  tpablacklist:
    description: Block a player from sending you TPA requests
    usage: /tpablacklist <player>
    permission: dtpa.command.tpablacklist
  tpaadmin:
    description: Admin commands for TPA management
    usage: /tpaadmin <clear|reload|info|remove>
    permission: dtpa.command.tpaadmin

permissions:
  dtpa.command.tpa:                { default: true }
  dtpa.command.tpahere:            { default: true }
  dtpa.command.tpaccept:           { default: true }
  dtpa.command.tpadeny:            { default: true }
  dtpa.command.tpatoggle:          { default: true }
  dtpa.command.tpaheretoggle:      { default: true }
  dtpa.command.tpauto:             { default: true }
  dtpa.command.tpatoggleconfirm:   { default: true }
  dtpa.command.tpcancel:           { default: true }
  dtpa.command.tpareload:          { default: op }
  dtpa.command.tpalist:            { default: true }
  dtpa.command.tpablacklist:       { default: true }
  dtpa.command.tpaadmin:           { default: op }
  dtpa.bypass.cooldown:            { default: op }
  dtpa.bypass.world:               { default: op }
  dtpa.bypass.maxrequests:         { default: op }
  dtpa.bypass.distance:            { default: op }

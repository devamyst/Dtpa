guis:
  sent_confirm:
    title: "&8Confirm TPA Request"
    rows: 3
    info:
      slot: 13
      display_name: "&e{receiver}"
      lore: ["", "&7Send a teleport request to this player."]
      glow: false
    accept:
      slot: 16
      type: LIME_STAINED_GLASS_PANE
      display_name: "&aConfirm"
      lore: ["", "&7Click to send the request."]
      glow: false
    refuse:
      slot: 10
      type: RED_STAINED_GLASS_PANE
      display_name: "&cCancel"
      lore: ["", "&7Click to cancel."]
      glow: false
  accept_request:
    title: "&8Incoming TPA Request"
    rows: 3
    info:
      slot: 13
      display_name: "&e{sender}"
      lore: ["", "&7This player wants to teleport."]
      glow: false
    accept:
      slot: 16
      type: LIME_STAINED_GLASS_PANE
      display_name: "&aAccept"
      lore: ["", "&7Click to accept the request."]
      glow: false
    refuse:
      slot: 10
      type: RED_STAINED_GLASS_PANE
      display_name: "&cDeny"
      lore: ["", "&7Click to deny the request."]
      glow: false

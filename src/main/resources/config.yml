sounds:
  request_sent: "BLOCK_NOTE_BLOCK_PLING"
  request_received: "ENTITY_EXPERIENCE_ORB_PICKUP"
  request_accept: "ENTITY_EXPERIENCE_ORB_PICKUP"
  request_deny: "BLOCK_NOTE_BLOCK_BASS"
  teleport_success: "ENTITY_ENDERMAN_TELEPORT"
  teleport_cancelled: "BLOCK_ANVIL_LAND"

settings:
  tpa_countdown: 3
  expired_time: 30
  teleport:
    action_bar: true
    title: true
  format:
    tpa: "TPA"
    tpa_here: "TPAHere"

  # ─── Cooldown ──────────────────────────────────────────────────────────────
  cooldown:
    enabled: true
    # Cooldown in seconds before a player can send another request after
    # their previous one is accepted, denied, or expires
    seconds: 10
    # Whether the cooldown applies per-target (true) or globally (false)
    per_target: true
    bypass_permission: "trickytpa.bypass.cooldown"

  # ─── World Blacklist ───────────────────────────────────────────────────────
  world_blacklist:
    enabled: false
    # Players in these worlds cannot SEND or RECEIVE TPA requests
    worlds: []
    bypass_permission: "trickytpa.bypass.world"

  # ─── Max Requests ──────────────────────────────────────────────────────────
  max_requests:
    enabled: true
    # Max pending outgoing requests a player can have at once
    per_player: 5
    bypass_permission: "trickytpa.bypass.maxrequests"

  # ─── Distance Limit ────────────────────────────────────────────────────────
  distance_limit:
    enabled: false
    # Maximum distance (in blocks) between sender and receiver for TPA
    # Only checked for TPA (not TPAHere, since the sender comes to the receiver)
    max_blocks: 1000
    bypass_permission: "trickytpa.bypass.distance"

  # ─── Damage Cancel ─────────────────────────────────────────────────────────
  damage_cancel:
    enabled: true
    # Taking any damage cancels the teleport countdown
    notify: true

  # ─── ActionBar Task ────────────────────────────────────────────────────────
  actionbar:
    interval_ticks: 20

